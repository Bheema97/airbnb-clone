services:
  - type: web
    name: stayfinder-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_PATH
        value: ./airbnb.db
      - key: SEED_IF_EMPTY
        value: "false"
      - key: SEED_ON_START
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false